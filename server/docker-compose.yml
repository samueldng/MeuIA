version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: meuia_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: meuia
    ports:
      - '5432:5432'
    volumes:
      - meuia_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d meuia"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: meuia_redis
    restart: always
    ports:
      - '6379:6379'
    volumes:
      - meuia_redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  meuia_pgdata:
  meuia_redisdata:
